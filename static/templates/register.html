{% extends "base_auth.html" %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="auth-wrapper">
    <div class="auth-box">

        <h2>Register</h2>

        <form id="register-form">

            <input
                type="text"
                id="username"
                placeholder="Username"
                class="input"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
                class="input"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                class="input"
            >

            <input
                type="password"
                id="password_confirm"
                placeholder="Confirm password"
                class="input"
            >

            <button type="submit">
                Register
            </button>

        </form>

        <p id="error-message"></p>

    </div>
</div>

<script src="{% static 'js/register.js' %}"></script>

{% endblock %}
